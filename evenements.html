<style>
    .page-hero { padding: 140px 0 80px; border-bottom: 1px solid var(--border); }
    .page-hero-inner { display: flex; justify-content: space-between; align-items: flex-end; gap: 48px; }
    .event-section { padding: 48px 0; border-bottom: 1px solid var(--border); }
    .event-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    .event-detail-grid.reverse { direction: rtl; }
    .event-detail-grid.reverse > * { direction: ltr; }
    .event-img-main { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; }
    .event-img-main img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85) saturate(0.9); transition: transform 0.6s cubic-bezier(0.16,1,0.3,1); }
    .event-img-main:hover img { transform: scale(1.03); }
    .event-detail-content { padding-top: 8px; }
    .event-num { font-family: var(--font-title); font-size: clamp(40px, 6vw, 72px); font-weight: 900; line-height: 1; letter-spacing: -0.05em; -webkit-text-stroke: 1px rgba(244,242,238,0.80); color: transparent; margin-bottom: -8px; }
    .event-name-big { font-family: var(--font-title); font-size: clamp(28px, 4vw, 48px); font-weight: 700; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 20px; }
    .event-meta-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 28px; border-top: 1px solid var(--border); }
    .event-meta-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .event-meta-key { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .event-meta-val { font-size: 14px; font-weight: 400; text-align: right; }
    .event-body { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 28px; }
    .event-gallery-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .event-gallery-sub-item { aspect-ratio: 4/3; overflow: hidden; }
    .event-gallery-sub-item img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75) saturate(0.85); transition: filter 0.3s; }
    .event-gallery-sub-item:hover img { filter: brightness(0.9) saturate(1); }
    .event-gallery-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; font-family: var(--font-title); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: var(--red); cursor: none; transition: opacity 0.2s; }
    .event-gallery-link:hover { opacity: 0.7; }
    .event-dossier-link { display: table; width: fit-content; margin-top: 10px; font-family: var(--font-title); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: var(--red); cursor: none; transition: opacity 0.2s; }
    .event-dossier-link:hover { opacity: 0.7; }
    /* ── ARTIST LINEUP ── */
    .artist-lineup { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .artist-tag { font-family: var(--font-title); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; padding: 6px 14px; border: 1px solid var(--border); color: var(--white); }
    .artist-tag.highlight { border-color: var(--red); color: var(--red); }

    @media (max-width: 900px) {

<script>
    const dot=document.getElementById('cursorDot'),blob=document.getElementById('cursorBlob');let mx=0,my=0,bx=0,by=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    function ab(){bx+=(mx-bx)*0.07;by+=(my-by)*0.07;blob.style.left=bx+'px';blob.style.top=by+'px';requestAnimationFrame(ab);}ab();
    const nav=document.getElementById('nav');window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>40),{passive:true});
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});},{threshold:0.08,rootMargin:'0px 0px -32px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    function toggleNav(){const b=document.getElementById('navBurger'),l=document.getElementById('navLinks');b.classList.toggle('open');l.classList.toggle('open');document.body.style.overflow=l.classList.contains('open')?'hidden':'';}
    document.querySelectorAll('#navLinks a').forEach(a=>a.addEventListener('click',()=>{document.getElementById('navLinks').classList.remove('open');document.getElementById('navBurger').classList.remove('open');document.body.style.overflow='';}));
    const modal=document.getElementById('ticketModal');
    function openModal(e){if(e)e.preventDefault();modal.classList.add('open');document.body.style.overflow='hidden';}
    function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}
    function closeModalOnBg(e){if(e.target===modal)closeModal();}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
    const LANG_KEY='bde-lang';
    function applyLang(lang){document.documentElement.lang=lang;const b=document.getElementById('langToggle');if(b)b.textContent=lang==='en'?'FR':'EN';document.querySelectorAll('[data-fr]').forEach(el=>{el.innerHTML=lang==='en'?el.dataset.en:el.dataset.fr;});localStorage.setItem(LANG_KEY,lang);}
    function toggleLang(){applyLang(document.documentElement.lang==='fr'?'en':'fr');}
    (function(){const s=localStorage.getItem(LANG_KEY);if(s){applyLang(s);return;}if(!(navigator.language||'fr').toLowerCase().startsWith('fr'))applyLang('en');})();
  </script>
