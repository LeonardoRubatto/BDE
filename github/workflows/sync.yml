name: Sync Excel ↔ Data JS

# Déclenché sur chaque push vers main qui touche
# soit admin.xlsx, soit les fichiers data/*.js
on:
  push:
    branches: [main]
    paths:
      - 'admin.xlsx'
      - 'data/site.js'
      - 'data/events.js'
      - 'data/sponsors.js'
      - 'data/galleries.js'
      - 'data/artists.js'

jobs:
  sync:
    # Ne pas s'exécuter si le commit a été créé par ce même workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write   # nécessaire pour que le bot puisse pousser

    steps:
      # ── 1. Checkout complet (fetch-depth 2 pour comparer avec HEAD~1) ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      # ── 3. Détection : qu'est-ce qui a changé ? ──────────────────────
      - name: Detect changed files
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Fichiers modifiés dans ce push :"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "admin.xlsx"; then
            echo "trigger=xlsx" >> $GITHUB_OUTPUT
            echo "→ admin.xlsx détecté — mise à jour de data/*.js"
          elif echo "$CHANGED" | grep -qE "^data/(site|events|sponsors|galleries|artists)\.js$"; then
            echo "trigger=js"   >> $GITHUB_OUTPUT
            echo "→ data/*.js détecté — mise à jour d'admin.xlsx"
          else
            echo "trigger=none" >> $GITHUB_OUTPUT
            echo "→ Aucun fichier nécessitant une sync"
          fi

      # ── 4a. admin.xlsx modifié → régénérer data/*.js ─────────────────
      - name: Excel → JS  (admin.xlsx a changé)
        if: steps.detect.outputs.trigger == 'xlsx'
        run: |
          echo "Lecture de admin.xlsx et régénération des data/*.js..."
          python sync.py

      # ── 4b. data/*.js modifié → régénérer admin.xlsx ─────────────────
      - name: JS → Excel  (data/*.js a changé)
        if: steps.detect.outputs.trigger == 'js'
        run: |
          echo "Lecture des data/*.js et mise à jour d'admin.xlsx..."
          python sync_init.py

      # ── 5. Commit des fichiers mis à jour ─────────────────────────────
      - name: Commit sync result
        if: steps.detect.outputs.trigger != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/site.js \
            data/events.js \
            data/sponsors.js \
            data/galleries.js \
            data/artists.js \
            admin.xlsx

          if git diff --staged --quiet; then
            echo "Aucun changement à committer — synchronisation déjà à jour."
          else
            git commit -m "sync: auto-synchronisation [skip ci]"
            git push
            echo "Push effectué."
          fi
