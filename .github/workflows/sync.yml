name: Sync CSV ↔ Data JS

# Déclenché sur chaque push vers main qui touche
# soit les fichiers csv/, soit les fichiers data/*.js
on:
  push:
    branches: [main]
    paths:
      - 'csv/*.csv'
      - 'data/site.js'
      - 'data/events.js'
      - 'data/sponsors.js'
      - 'data/galleries.js'
      - 'data/artists.js'

jobs:
  sync:
    # Ne pas s'exécuter si le commit a été créé par ce même workflow (le bot)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      # Pas de pip install — on utilise uniquement des modules Python natifs (csv, json)

      # ── Détection : qu'est-ce qui a changé ? ─────────────────────────
      - name: Detect changed files
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Fichiers modifiés : $CHANGED"

          if echo "$CHANGED" | grep -qE "^csv/.*\.csv$"; then
            echo "trigger=csv" >> $GITHUB_OUTPUT
            echo "→ CSV modifié — mise à jour de data/*.js"
          elif echo "$CHANGED" | grep -qE "^data/(site|events|sponsors|galleries|artists)\.js$"; then
            echo "trigger=js" >> $GITHUB_OUTPUT
            echo "→ data/*.js modifié — mise à jour des CSV"
          else
            echo "trigger=none" >> $GITHUB_OUTPUT
            echo "→ Aucune sync nécessaire"
          fi

      # ── CSV → JS ─────────────────────────────────────────────────────
      - name: CSV → JS  (csv/ a changé)
        if: steps.detect.outputs.trigger == 'csv'
        run: python sync.py

      # ── JS → CSV ─────────────────────────────────────────────────────
      - name: JS → CSV  (data/*.js a changé)
        if: steps.detect.outputs.trigger == 'js'
        run: python sync_init.py

      # ── Commit ───────────────────────────────────────────────────────
      - name: Commit sync result
        if: steps.detect.outputs.trigger != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/site.js data/events.js data/sponsors.js \
            data/galleries.js data/artists.js \
            csv/

          if git diff --staged --quiet; then
            echo "Déjà synchronisé — rien à committer."
          else
            git commit -m "sync: auto-synchronisation"
            git push
            echo "Push effectué."
          fi
